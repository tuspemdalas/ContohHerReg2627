<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Siswa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0055aa);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}

#hasil{
    display:none;
    margin-top:20px;
    background:#f4f6f9;
    padding:15px;
    border-radius:10px;
}

.label{
    font-weight:bold;
    color:#003366;
}

.error{
    color:red;
}
</style>

</head>
<body>

<div class="container">
    <h2>Pengumuman Siswa</h2>


<input type="text" id="nis" placeholder="Masukkan NIS">

<button onclick="cariData()">Cari</button>

<div id="hasil"></div>


</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxL-a4zAVvb_0uat5NN9lVcVtSYssIxZWJSpbTKUJpUhDs-BBTgRWjqVCfYcUlyW_ep/exec";

function cariData(){

    const nis = document.getElementById("nis").value.trim();
    const hasil = document.getElementById("hasil");

    if(!nis){
        alert("Silakan masukkan NIS");
        return;
    }

    hasil.style.display = "block";
    hasil.innerHTML = "Memproses...";

    fetch(`${API_URL}?nis=${nis}`)
    .then(res => res.json())
    .then(data => {

        if(data.found){

            hasil.innerHTML = `
                <h3>Data Siswa</h3>
                <br>
                <p><span class="label">NIS :</span> ${data.nis}</p>
                <p><span class="label">Nama :</span> ${data.nama}</p>
                <p><span class="label">Kelas :</span> ${data.kelas}</p>
            `;

        }else{

            hasil.innerHTML = `
                <p class="error">
                    NIS tidak ditemukan.
                </p>
            `;

        }

    })
    .catch(err => {

        hasil.innerHTML = `
            <p class="error">
                Gagal mengambil data.
            </p>
        `;

        console.error(err);

    });

}
</script>

</body>
</html>

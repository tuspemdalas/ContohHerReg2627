<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelas Siswa TA 2026/2027</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0055aa);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:600px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#0055aa;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#003366;
}

.result{
    margin-top:25px;
    display:none;
    background:#f5f7fa;
    padding:20px;
    border-radius:10px;
}

.result p{
    margin:10px 0;
}

.label{
    font-weight:bold;
    color:#003366;
}
</style>
</head>
<body>

<div class="container">

<h1>Pengumuman Kelas Siswa</h1>
<p class="subtitle">Tahun Ajaran 2026/2027</p>

<input type="text" id="nis" placeholder="Masukkan NIS">

<button onclick="cariData()">Cari</button>

<div class="result" id="hasil">
    <p><span class="label">Nama :</span> <span id="nama"></span></p>
    <p><span class="label">Kelas :</span> <span id="kelas"></span></p>
    <p><span class="label">Wali Kelas :</span> <span id="wali"></span></p>
    <p><span class="label">WA Wali Kelas :</span> <span id="wa"></span></p>
    <p><span class="label">Link Grup WA Kelas :</span> <span id="grup"></span></p>
</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw5KeaxBEmaLDSECA1kyvi0BAtDQwt2Sp5Y3EzHhqQy2DSOt5BNY6S4Po-wif9VeH4J/exec";

function cariData(){

    let nis = document.getElementById("nis").value;

    if(!nis){
    alert("Silakan masukkan NIS");
    return;
    }

    fetch(`${WEB_APP_URL}?nis=${nis}`)
    .then(response => response.json())
    .then(data => {

        if(data.status=="success"){

            document.getElementById("hasil").style.display="block";

            document.getElementById("nama").innerText = data.nama;
            document.getElementById("kelas").innerText = data.kelas;
            document.getElementById("wali").innerText = data.wali;
            document.getElementById("wa").innerText = data.wa;
            document.getElementById("wa").innerText = data.grup;

        }else{

            alert("Data siswa tidak ditemukan");

        }

    });

}

</script>

</body>
</html>
